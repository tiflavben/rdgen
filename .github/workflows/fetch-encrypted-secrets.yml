name: Fetch Encrypted Secrets

on:
  workflow_call:
    inputs:
      zip_url_json:
        required: true
        type: string

jobs:
  download-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Download zip with retry
        shell: bash
        run: |
          MAX_ATTEMPTS=3
          attempt=1
          while [ $attempt -le $MAX_ATTEMPTS ]; do
            echo "Download attempt $attempt of $MAX_ATTEMPTS..."
            if python3 << 'PYEOF'
import requests
import json
import sys

input_data = json.loads('''${{ inputs.zip_url_json }}''')
url = f"{input_data['url']}/get_zip?filename={input_data['file']}"

r = requests.get(url, timeout=30)
r.raise_for_status()
with open('secrets.zip', 'wb') as f:
    f.write(r.content)
print('Download successful')
sys.exit(0)
PYEOF
            then
              echo "Success!"
              exit 0
            else
              echo "Attempt $attempt failed"
              attempt=$((attempt + 1))
              [ $attempt -le $MAX_ATTEMPTS ] && sleep 5
            fi
          done
          echo "All attempts failed"
          exit 1

      - name: Upload Encrypted Artifact
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-secrets-zip
          path: secrets.zip
          retention-days: 1
