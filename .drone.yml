kind: pipeline
type: docker
name: build-linux

platform:
  os: linux
  arch: amd64

node:
  type: linux

trigger:
  branch:
    - master
  event:
    - push
    - promote
    - custom

steps:
  - name: clone-and-build
    image: rust:1.75
    commands:
      - apt-get update && apt-get install -y git curl build-essential nasm libgtk-3-dev libxcb-randr0-dev libxcbfixes0-dev libxcb-shape0dam-xinerama0-dev libxkbcommon-dev libxkbcommon-x11-dev libx11-xcb-dev libvulkan-dev libpulse-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libarchive-tools libfuse2
      - git clone --depth 1 --branch master https://github.com/rustdesk/rustdesk.git /workspace/rustdesk
      - cd /workspace/rustdesk && submodule update --init --recursive --depth 1
      - echo "Setup complete. Starting build..."
      - cargo build --release --target x86_64-unknown-linux-gnu
      - echo "Build complete"

