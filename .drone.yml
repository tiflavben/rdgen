kind: pipeline
type: docker
name: build-linux

platform:
  os: linux
  arch: amd64

node:
  type: linux

trigger:
  branch:
    - master
  event:
    - push
    - promote
    - custom

environment:
  GHUSER:
    from_secret: GHUSER
  GHBEARER:
    from_secret: GHBEARER
  GENURL:
    from_secret: GENURL
  SH_SECRET:
    from_secret: SH_SECRET
  ZIP_PASSWORD:
    from_secret: ZIP_PASSWORD
  REPONAME: rdgen
  GHBRANCH: master
  VERSION: master
  RUST_VERSION: 1.75
  UPLOAD_ARTIFACT: true
  VCPKG_COMMIT_ID: 120deac3062162151622ca4860575a33844ba10b

steps:
  - name: clone-rustdesk
    image: rustdeskorg/rustdesk-builder:latest
    commands:
      - git clone --depth 1 --branch master https://github.com/rustdesk/rustdesk.git /workspace/rustdesk
      - cd /workspace/rustdesk
      - submodule update --init --recursive --depth 1

  - name: apply-patches
    image: rustdeskorg/rustdesk-builder:latest
    commands:
      - cd /workspace/rustdesk
      - echo "Applying custom patches..."

  - name: build-x86_64
    image: rustdeskorg/rustdesk-builder:latest
    commands:
      - cd /workspace/rustdesk
      - cargo build --release --target x86_64-unknown-linux-gnu
      - echo "Build x86_64 complete"

