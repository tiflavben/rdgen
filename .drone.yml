kind: pipeline
type: docker
name: build-linux

platform:
  os: linux
  arch: amd64

node:
  type: linux

trigger:
  branch:
    - master
  event:
    - push
    - promote
    - custom

steps:
  - name: clone-rustdesk
    image: rustdeskorg/rustdesk-builder:latest
    commands:
      - git clone --depth 1 --branch master https://github.com/rustdesk/rustdesk.git /workspace/rustdesk
      - cd /workspace/rustdesk
      - submodule update --init --recursive --depth 1
      - echo "Clone complete"

  - name: build-x86_64
    image: rustdeskorg/rustdesk-builder:latest
    commands:
      - cd /workspace/rustdesk
      - echo "Starting RustDesk x86_64 build..."
      - cargo build --release --target x86_64-unknown-linux-gnu
      - echo "Build complete"

